name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the
# in-progress and latest. Do not cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable
          cache: true

      - run: flutter pub get

      # base-href must match the GitHub Pages sub-path: the repo is served at
      # https://kabdoullah.github.io/gold_bar_invoice_management/
      - run: flutter build web --release --base-href /gold_bar_invoice_management/

      # GitHub Pages runs Jekyll, which strips files/folders starting with "_".
      # .nojekyll disables that so Flutter's output is served verbatim.
      - run: touch build/web/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
